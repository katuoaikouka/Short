<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shorts Pro UI - Invidious API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --yt-red: #ff0000;
            --overlay-grad: linear-gradient(rgba(0,0,0,0) 60%, rgba(0,0,0,0.85) 100%);
            --panel-bg: #212121;
            --icon-active: rgba(255, 255, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #fff;
            font-family: "Roboto", sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .shorts-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            background: #000;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .custom-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .loader-dot {
            width: 12px;
            height: 12px;
            background: var(--yt-red);
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0.3; }
        }

        .hidden { display: none !important; }

        .side-bar {
            position: absolute;
            right: 12px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: none;
            background: none;
            color: white;
            padding: 0;
            transition: 0.1s;
        }

        .btn-icon-bg {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 4px;
            backdrop-filter: blur(10px);
        }

        .action-btn:active .btn-icon-bg { background: var(--icon-active); transform: scale(0.9); }
        .action-btn span { font-size: 12px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        .video-meta {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 80px 16px 28px;
            background: var(--overlay-grad);
            pointer-events: none;
            box-sizing: border-box;
            z-index: 40;
        }

        .video-meta * { pointer-events: auto; }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .username { font-weight: bold; font-size: 15px; }

        .subscribe-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: bold;
        }

        .title {
            font-size: 14px;
            line-height: 1.4;
            max-width: 85%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
        }

        .slide-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--panel-bg);
            border-radius: 12px 12px 0 0;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .slide-panel.open { transform: translateY(0); }

        .panel-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .description-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .stat-item .stat-value { font-size: 18px; font-weight: bold; display: block; }
        .stat-item .stat-label { font-size: 12px; color: #aaa; }

        .description-text {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #eee;
        }

        .share-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            text-align: center;
        }

        .share-item {
            cursor: pointer;
            transition: 0.2s;
        }

        .share-item:active { transform: scale(0.9); }

        .share-item .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto 8px;
        }

        .share-item span { font-size: 11px; color: #ccc; }
        .fa-line { color: #06C755; }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 60;
        }

        .progress-bar {
            height: 100%;
            background: var(--yt-red);
            width: 0%;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="shorts-container">
    <div class="video-wrapper">
        
        <div id="loader" class="custom-loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>

        <video id="v" loop playsinline crossorigin="anonymous"></video>

        <div class="side-bar">
            <div class="action-btn">
                <div class="btn-icon-bg"><i class="fas fa-thumbs-up"></i></div>
                <span id="ui-likes">0</span>
            </div>
            <div class="action-btn">
                <div class="btn-icon-bg"><i class="fas fa-thumbs-down"></i></div>
                <span>低評価</span>
            </div>
            <div class="action-btn" onclick="openPanel('commentPanel')">
                <div class="btn-icon-bg"><i class="fas fa-comment-dots"></i></div>
                <span>-</span>
            </div>
            <div class="action-btn" onclick="openPanel('sharePanel')">
                <div class="btn-icon-bg"><i class="fas fa-share"></i></div>
                <span>共有</span>
            </div>
        </div>

        <div class="video-meta">
            <div class="profile-row">
                <img id="ui-avatar" src="" class="avatar" alt="user">
                <span id="ui-username" class="username">読み込み中...</span>
                <button class="subscribe-btn">登録</button>
            </div>
            <div id="swipeTarget" class="title" onclick="openPanel('descriptionPanel')">
                動画を取得しています...
            </div>
        </div>

        <div class="progress-container">
            <div id="pBar" class="progress-bar"></div>
        </div>

        <div id="descriptionPanel" class="slide-panel">
            <div class="panel-header">
                <strong>説明</strong>
                <i class="fas fa-times" onclick="closePanels()" style="cursor:pointer; padding:5px;"></i>
            </div>
            <div class="panel-content">
                <div class="description-stats">
                    <div class="stat-item">
                        <span id="ui-desc-likes" class="stat-value">-</span>
                        <span class="stat-label">高く評価</span>
                    </div>
                    <div class="stat-item">
                        <span id="ui-desc-views" class="stat-value">-</span>
                        <span class="stat-label">視聴回数</span>
                    </div>
                    <div class="stat-item">
                        <span id="ui-desc-date" class="stat-value">-</span>
                        <span class="stat-label">投稿日</span>
                    </div>
                </div>
                <div id="ui-desc-text" class="description-text"></div>
            </div>
        </div>

        <div id="commentPanel" class="slide-panel">
            <div class="panel-header">
                <strong>コメント</strong>
                <i class="fas fa-times" onclick="closePanels()" style="cursor:pointer; padding:5px;"></i>
            </div>
            <div class="panel-content">
                <p style="text-align:center; color:#888; font-size:14px;">コメント機能をここに表示</p>
            </div>
        </div>

        <div id="sharePanel" class="slide-panel">
            <div class="panel-header">
                <strong>共有</strong>
                <i class="fas fa-times" onclick="closePanels()" style="cursor:pointer; padding:5px;"></i>
            </div>
            <div class="panel-content">
                <div class="share-grid">
                    <div class="share-item" onclick="shareToLine()">
                        <div class="icon-box"><i class="fab fa-line"></i></div>
                        <span>LINE</span>
                    </div>
                    <div class="share-item" onclick="copyUrl()">
                        <div class="icon-box"><i class="fas fa-link"></i></div>
                        <span>URLをコピー</span>
                    </div>
                    <div class="share-item" onclick="systemShare()">
                        <div class="icon-box"><i class="fas fa-ellipsis-h"></i></div>
                        <span>その他</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast" class="toast">URLをコピーしました</div>

    </div>
</div>

<script>
    const video = document.getElementById('v');
    const loader = document.getElementById('loader');
    const pBar = document.getElementById('pBar');
    const toast = document.getElementById('toast');
    const swipeTarget = document.getElementById('swipeTarget');

    let currentVideoId = "";

    // --- APIから動画を読み込む ---
    async function loadFunnyVideo() {
        loader.classList.remove('hidden');
        try {
            const res = await fetch('/api/video/funny');
            const data = await res.json();
            
            if (data.error) throw new Error(data.error);

            currentVideoId = data.id;
            
            // UIへの反映
            document.getElementById('ui-username').innerText = data.author;
            document.getElementById('ui-avatar').src = data.avatar;
            document.getElementById('ui-likes').innerText = data.likes;
            document.getElementById('swipeTarget').innerText = data.title;
            
            document.getElementById('ui-desc-likes').innerText = data.likes;
            document.getElementById('ui-desc-views').innerText = data.views;
            document.getElementById('ui-desc-date').innerText = data.date;
            document.getElementById('ui-desc-text').innerText = data.description;

            // 動画URLセット
            video.src = data.video_url;
            video.load();
        } catch (e) {
            console.error("Failed to load video", e);
            document.getElementById('swipeTarget').innerText = "動画の読み込みに失敗しました: " + e.message;
            loader.classList.add('hidden');
        }
    }

    video.addEventListener('canplay', () => {
        loader.classList.add('hidden');
        video.play().catch(() => {
            console.log("Autoplay blocked - needs user interaction");
        });
    });

    video.addEventListener('timeupdate', () => {
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            pBar.style.width = percent + '%';
        }
    });

    function openPanel(id) {
        closePanels();
        document.getElementById(id).classList.add('open');
    }

    function closePanels() {
        document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('open'));
    }

    // --- スワイプジェスチャー ---
    let touchStartY = 0;
    swipeTarget.addEventListener('touchstart', (e) => {
        touchStartY = e.touches.clientY;
    }, {passive: true});

    swipeTarget.addEventListener('touchend', (e) => {
        let touchEndY = e.changedTouches.clientY;
        if (touchStartY - touchEndY > 30) {
            openPanel('descriptionPanel');
        }
    }, {passive: true});

    // --- 共有機能 ---
    function shareToLine() {
        const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
        window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}`, '_blank');
    }

    function copyUrl() {
        const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
        navigator.clipboard.writeText(url).then(() => {
            showToast("YouTube URLをコピーしました");
            closePanels();
        }).catch(err => {
            showToast("コピーに失敗しました");
        });
    }

    async function systemShare() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: document.getElementById('swipeTarget').innerText,
                    url: `https://www.youtube.com/watch?v=${currentVideoId}`
                });
            } catch (err) { console.log(err); }
        } else {
            showToast("共有未対応ブラウザです");
        }
    }

    function showToast(msg) {
        toast.innerText = msg;
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 2000);
    }

    // ビデオクリックで再生/一時停止
    document.querySelector('.video-wrapper').addEventListener('click', (e) => {
        if(e.target.closest('.side-bar') || e.target.closest('.slide-panel') || e.target.closest('.video-meta')) return;
        
        const anyPanelOpen = document.querySelector('.slide-panel.open');
        if (anyPanelOpen) {
            closePanels();
        } else {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }
    });

    // 初期読み込み実行
    loadFunnyVideo();
</script>

</body>
</html>
